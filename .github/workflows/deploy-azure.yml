name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude ".venv/*" \
            --exclude "output/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc"
          az webapp deploy \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --resource-group carlooking-rg \
            --src-path deploy.zip \
            --type zip \
            --async true

      - name: Wait for site to be healthy
        run: |
          URL="https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/debug"
          echo "Polling $URL ..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Site is healthy."
              exit 0
            fi
            sleep 20
          done
          echo "Site did not become healthy within 8 minutes."
          exit 1
